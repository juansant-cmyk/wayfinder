name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app tests

      - name: Run unit tests
        run: pytest -m unit -v

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: wayfinder
          POSTGRES_PASSWORD: wayfinder
          POSTGRES_DB: wayfinder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wayfinder -d wayfinder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://wayfinder:wayfinder@localhost:5432/wayfinder
      JWT_SECRET: ci-test-secret
      USE_MOCK_PROVIDERS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest -m integration -v

  backend-prod-smoke:
    name: Backend prod smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: ci-test-secret
      USE_MOCK_PROVIDERS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-prod.txt

      - name: Install production dependencies
        run: pip install -r requirements-prod.txt

      - name: Verify app imports on prod deps
        run: python -c "from app.main import app; assert app.title"

  database-schema:
    name: Database schema apply
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: wayfinder
          POSTGRES_PASSWORD: wayfinder
          POSTGRES_DB: wayfinder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wayfinder -d wayfinder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema migrations
        env:
          PGPASSWORD: wayfinder
        run: |
          for f in $(ls database/schema/*.sql | sort); do
            echo "Applying $f"
            psql -h localhost -U wayfinder -d wayfinder -v ON_ERROR_STOP=1 -f "$f"
          done

  backend-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements-prod.txt

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
