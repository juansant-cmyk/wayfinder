name: CI Test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
        
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
        
      - name: Install dependencies
        run: pip install -r requirements.txt ruff
  
      - name: Lint testing
        run: ruff check app tests
  
      - name: Run unit tests
        run: pytest -m unit -v

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
  
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: wayfinder
          POSTGRES_PASSWORD: wayfinder
          POSTGRES_DB: wayfinder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wayfinder -d wayfinder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://wayfinder:wayfinder@localhost:5432/wayfinder
      JWT_SECRET: ci-test-secret
      USE_MOCK_PROVIDERS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
          
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        run: pytest -m smoke -v

      - name: Run integration tests
        run: pytest -m integration -v
