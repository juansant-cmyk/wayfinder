services:
  db:
    image: postgis/postgis:15-3.4
    container_name: wayfinder-db
    environment:
      POSTGRES_USER: wayfinder
      POSTGRES_PASSWORD: wayfinder
      POSTGRES_DB: wayfinder
    ports:
      - "55432:5432"
    volumes:
      - wayfinder_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayfinder -d wayfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wayfinder_pg_data:
