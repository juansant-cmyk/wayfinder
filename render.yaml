services:
  - type: web
    name: wayfinder-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: USE_MOCK_PROVIDERS
        value: "false"
      - key: HOTEL_PROVIDER
        value: "liteapi"
      - key: LITEAPI_API_KEY
        sync: false
      - key: LITEAPI_BASE_URL
        value: "https://api.liteapi.travel/v3.0"
      - key: LITEAPI_GUEST_NATIONALITY
        value: "US"
      - key: LITEAPI_CURRENCY
        value: "USD"
      - key: WEATHER_PROVIDER
        value: "weatherapi"
      - key: WEATHER_API_KEY
        sync: false
      - key: TRAVEL_RISK_PROVIDER
        value: "travelrisk"
      - key: TRAVEL_RISK_API_KEY
        sync: false
      - key: TRAVEL_RISK_BASE_URL
        value: "https://travelriskapi.com/api/v1"
      - key: TRAVEL_RISK_CACHE_TTL_SECONDS
        value: "300"
      - key: CORS_ORIGINS
        sync: false
