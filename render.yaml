services:
  - type: web
    name: wayfinder-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: USE_MOCK_PROVIDERS
        value: "true"
      - key: CORS_ORIGINS
        sync: false
